<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGUKT Learner | Welcome</title>
    <style>
        :root {
            --primary: #4e73df;
            --accent: #22c55e;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Animated Gradient Background */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Animation for the Icon */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 400px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
            display: inline-block;
        }

        h1 {
            font-size: 28px;
            margin: 0;
            background: linear-gradient(to right, #4e73df, #23a6d5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p { color: #555; font-size: 14px; margin: 10px 0 30px; }

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.5);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(78, 115, 223, 0.2);
            background: white;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 15px -3px rgba(78, 115, 223, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(78, 115, 223, 0.4);
        }

        .btn:active { transform: scale(0.98); }

        /* Feature Preview Icons */
        .preview {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            opacity: 0.7;
        }

        .preview-item { font-size: 12px; font-weight: 600; color: #444; }
        .preview-item div { font-size: 24px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">🎓</div>
        <h1>RGUKT HUB</h1>
        <p>Premium Engineering Resources</p>
        
        <div class="input-box">
            <input type="text" id="username" placeholder="Enter your full name">
        </div>

        <button class="btn" onclick="handleLogin()">Start Learning ➔</button>

        <div class="preview">
            <div class="preview-item"><div>📚</div>Notes</div>
            <div class="preview-item"><div>📄</div>Papers</div>
            <div class="preview-item"><div>🎥</div>Videos</div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const name = document.getElementById('username').value;
            if (name.trim().length < 3) {
                alert("Please enter a valid name to proceed.");
                return;
            }

            // Button Loading Effect
            const btn = document.querySelector('.btn');
            btn.innerHTML = "Opening Hub...";
            btn.style.opacity = "0.7";

            setTimeout(() => {
                localStorage.setItem("rgukt_user", name);
                localStorage.setItem("visit_count", 1);
                window.location.href = "dashboard.html";
            }, 800);
        }

        // Auto-redirect if already logged in
        window.onload = () => {
            if(localStorage.getItem("rgukt_user")) {
                window.location.href = "dashboard.html";
            }
        }
    </script>
</body>
</html>
